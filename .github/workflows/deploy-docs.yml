name: $bog_docs

permissions: write-all

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - uses: hyoo-ru/mam_build@master2
      with:
        package: 'bog/docs'
        modules: "app"

    - uses: hyoo-ru/gh-deploy@v4.4.1
      if: github.ref == 'refs/heads/master'
      with:
        folder: 'bog/docs/app/-'

    - name: Ensure Pages deploys from gh-pages branch
      if: github.ref == 'refs/heads/master'
      run: |
        gh api repos/${{ github.repository }}/pages \
          --method PUT \
          --field source='{"branch":"gh-pages","path":"/"}' \
          --field build_type=legacy
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
